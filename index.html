<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Premium Snakes & Ladders</title>
<link rel="manifest" href="/snl-manifest.json">
<meta name="theme-color" content="#d4a843">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Snakes & Ladders">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/*============================================
  RESET & VARIABLES
============================================*/
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --gold:#d4a843;
  --gold-light:#f0d060;
  --gold-bright:#ffd700;
  --gold-dim:#a07830;
  --bg-dark:#1a1410;
  --bg-darker:#0f0c08;
  --bg-card:rgba(30,25,18,.85);
  --text-light:#e8dcc8;
  --text-dim:#8a7a62;
  --snake-red:#c0392b;
  --snake-red-light:#e74c3c;
  --ladder-green:#27ae60;
  --ladder-green-light:#2ecc71;
  --board-light:#f5e6c8;
  --board-dark:#e8d5a8;
  --board-border:#5a3d1a;
}

html,body{height:100%;overflow-x:hidden}

body{
  font-family:'Cormorant Garamond',serif;
  background:var(--bg-darker);
  color:var(--text-light);
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

/* Background texture */
body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(ellipse at 30% 20%,rgba(80,50,20,.15) 0%,transparent 60%),
    radial-gradient(ellipse at 70% 80%,rgba(60,40,15,.1) 0%,transparent 60%),
    repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(60,40,15,.03) 2px,rgba(60,40,15,.03) 4px),
    linear-gradient(135deg,#1a1410 0%,#0f0c08 40%,#1a1410 60%,#0f0c08 100%);
}

body::after{
  content:'';position:fixed;inset:0;opacity:.03;z-index:-1;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-dark)}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px}

/*============================================
  TITLE
============================================*/
.title-container{text-align:center;padding:20px 20px 10px}

.title{
  font-family:'Cinzel',serif;font-weight:900;
  font-size:clamp(24px,5vw,44px);
  background:linear-gradient(135deg,#f0d060 0%,#d4a843 25%,#ffd700 50%,#d4a843 75%,#f0d060 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 4s ease-in-out infinite;
  filter:drop-shadow(0 0 20px rgba(212,168,67,.4));
  letter-spacing:3px;text-transform:uppercase;
}

.title-icon{font-size:clamp(18px,3vw,28px);display:block;margin-bottom:-5px;
  filter:drop-shadow(0 0 10px rgba(212,168,67,.5))}

@keyframes shimmer{0%,100%{background-position:0% center}50%{background-position:200% center}}

.subtitle{
  font-family:'Cormorant Garamond',serif;font-size:clamp(10px,1.5vw,13px);
  color:var(--text-dim);letter-spacing:6px;text-transform:uppercase;margin-top:4px;
}

/*============================================
  LAYOUT
============================================*/
.main-container{
  display:flex;gap:24px;padding:10px 20px 30px;
  max-width:1200px;width:100%;justify-content:center;
  align-items:flex-start;flex-wrap:wrap;
}

/*============================================
  STATUS BAR
============================================*/
.status-bar{
  display:flex;align-items:center;justify-content:center;gap:12px;
  padding:10px 24px;background:var(--bg-card);
  border:1px solid rgba(212,168,67,.2);border-radius:12px;
  margin-bottom:12px;backdrop-filter:blur(10px);
  box-shadow:0 4px 20px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05);
}

.status-text{
  font-family:'Cinzel',serif;font-size:clamp(14px,2vw,18px);
  font-weight:600;color:var(--gold-light);letter-spacing:2px;
}

/*============================================
  PLAYER INDICATORS
============================================*/
.players-bar{
  display:flex;gap:12px;margin-bottom:12px;width:100%;
  max-width:520px;justify-content:center;flex-wrap:wrap;
}

.player-card{
  flex:1;min-width:120px;display:flex;align-items:center;gap:10px;
  padding:10px 16px;background:var(--bg-card);
  border:1px solid rgba(212,168,67,.15);border-radius:10px;
  backdrop-filter:blur(10px);transition:all .3s ease;
}

.player-card.active{
  border-color:var(--gold);
  box-shadow:0 0 15px rgba(212,168,67,.25);
}

.player-token-preview{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}

.player-info{display:flex;flex-direction:column}
.player-name{
  font-family:'Cinzel',serif;font-size:13px;font-weight:700;
  color:var(--gold-light);letter-spacing:1px;
}
.player-pos{font-size:12px;color:var(--text-dim)}

/*============================================
  CONTROLS
============================================*/
.controls{
  display:flex;gap:10px;margin-bottom:12px;
  flex-wrap:wrap;justify-content:center;
}

.btn{
  font-family:'Cinzel',serif;font-weight:600;
  font-size:clamp(11px,1.4vw,13px);padding:10px 18px;
  border:1px solid var(--gold-dim);border-radius:10px;
  background:linear-gradient(135deg,rgba(40,30,15,.9),rgba(25,18,8,.95));
  color:var(--gold-light);cursor:pointer;transition:all .3s ease;
  display:flex;align-items:center;gap:8px;letter-spacing:1px;
  text-transform:uppercase;backdrop-filter:blur(10px);
  box-shadow:0 2px 10px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05);
  user-select:none;white-space:nowrap;
}

.btn:hover{
  border-color:var(--gold);
  box-shadow:0 0 20px rgba(212,168,67,.3),0 4px 15px rgba(0,0,0,.4);
  transform:translateY(-1px);color:var(--gold-bright);
}

.btn:active{transform:translateY(1px)}
.btn-icon{font-size:16px;line-height:1}

.btn.active{
  border-color:var(--gold);
  background:linear-gradient(135deg,rgba(60,45,15,.9),rgba(40,30,10,.95));
  box-shadow:0 0 15px rgba(212,168,67,.25);
}

.btn:disabled{
  opacity:.4;cursor:not-allowed;
  transform:none !important;
  box-shadow:0 2px 10px rgba(0,0,0,.3) !important;
}

/* Player count selector */
.player-selector{
  display:flex;gap:6px;margin-bottom:12px;
  justify-content:center;
}

.player-count-btn{
  font-family:'Cinzel',serif;font-weight:600;font-size:12px;
  padding:8px 16px;border:1px solid rgba(212,168,67,.2);
  border-radius:8px;background:var(--bg-card);
  color:var(--text-dim);cursor:pointer;transition:all .3s ease;
  letter-spacing:1px;
}

.player-count-btn.active{
  border-color:var(--gold);color:var(--gold-light);
  box-shadow:0 0 12px rgba(212,168,67,.2);
}

.player-count-btn:hover{border-color:var(--gold);color:var(--gold-light)}

/*============================================
  DICE
============================================*/
.dice-area{
  display:flex;flex-direction:column;align-items:center;
  gap:12px;margin-bottom:16px;
}

.dice-container{
  position:relative;width:80px;height:80px;
  perspective:600px;cursor:pointer;
}

.dice{
  width:80px;height:80px;border-radius:14px;
  background:linear-gradient(145deg,#f5f0e0,#e8dcc0);
  border:2px solid var(--gold-dim);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;font-weight:900;font-family:'Cinzel',serif;
  color:#3a2a10;
  box-shadow:0 4px 20px rgba(0,0,0,.4),
    inset 0 2px 0 rgba(255,255,255,.4),
    inset 0 -2px 0 rgba(0,0,0,.1);
  transition:transform .1s ease;
  user-select:none;
}

.dice:hover{transform:scale(1.05)}
.dice:active{transform:scale(.95)}

.dice.rolling{
  animation:diceRoll .6s ease-out;
}

@keyframes diceRoll{
  0%{transform:rotateX(0) rotateZ(0) scale(1)}
  25%{transform:rotateX(180deg) rotateZ(90deg) scale(.9)}
  50%{transform:rotateX(360deg) rotateZ(180deg) scale(.85)}
  75%{transform:rotateX(540deg) rotateZ(270deg) scale(.9)}
  100%{transform:rotateX(720deg) rotateZ(360deg) scale(1)}
}

.dice-dots{
  display:grid;grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:3px;width:52px;height:52px;padding:4px;
}

.dot{
  width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#5a3d1a,#2a1a08);
  box-shadow:inset 0 1px 2px rgba(0,0,0,.3),0 1px 0 rgba(255,255,255,.2);
  align-self:center;justify-self:center;
  opacity:0;transition:opacity .2s ease;
}

.dot.visible{opacity:1}

.roll-instruction{
  font-family:'Cinzel',serif;font-size:12px;
  color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;
}

/*============================================
  BOARD
============================================*/
.board-section{
  display:flex;flex-direction:column;align-items:center;
}

.board-wrapper{
  position:relative;padding:12px;
  background:linear-gradient(145deg,#6b4423,#4a2e14,#5a3618,#3d2210);
  border-radius:8px;
  box-shadow:
    0 0 0 1px rgba(100,65,25,.5),
    0 0 0 3px rgba(40,25,10,.8),
    0 0 0 4px rgba(100,65,25,.3),
    0 10px 40px rgba(0,0,0,.5),
    0 20px 60px rgba(0,0,0,.3),
    inset 0 1px 0 rgba(255,255,255,.1);
}

.board-wrapper::before{
  content:'';position:absolute;inset:0;border-radius:8px;
  background:repeating-linear-gradient(175deg,transparent,transparent 8px,rgba(255,255,255,.02) 8px,rgba(255,255,255,.02) 9px);
  pointer-events:none;
}

.board-inner{
  position:relative;border:1px solid rgba(0,0,0,.3);
  border-radius:2px;overflow:hidden;
  box-shadow:inset 0 0 10px rgba(0,0,0,.3);
}

.board{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  grid-template-rows:repeat(10,1fr);
  width:clamp(300px,82vw,520px);
  height:clamp(300px,82vw,520px);
  position:relative;
}

/*============================================
  SQUARES
============================================*/
.cell{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  border:1px solid rgba(0,0,0,.08);
  transition:background-color .3s ease;
  overflow:hidden;
}

.cell.light{background:var(--board-light)}
.cell.dark{background:var(--board-dark)}

.cell-number{
  position:absolute;top:2px;left:3px;
  font-family:'Cinzel',serif;font-size:clamp(7px,1.1vw,10px);
  font-weight:700;color:rgba(60,40,15,.5);z-index:1;
}

/* Snake head/tail markers */
.cell.snake-head::after{
  content:'🐍';position:absolute;bottom:1px;right:2px;
  font-size:clamp(8px,1.3vw,14px);opacity:.8;z-index:1;
}

.cell.ladder-bottom::after{
  content:'🪜';position:absolute;bottom:1px;right:2px;
  font-size:clamp(8px,1.3vw,14px);opacity:.8;z-index:1;
}

/* Highlight active cell */
.cell.highlight{
  background:rgba(212,168,67,.3) !important;
  box-shadow:inset 0 0 15px rgba(212,168,67,.3);
}

.cell.snake-cell{
  background:rgba(192,57,43,.12) !important;
}

.cell.ladder-cell{
  background:rgba(39,174,96,.12) !important;
}

/*============================================
  TOKENS ON BOARD
============================================*/
.tokens-container{
  position:absolute;display:flex;gap:2px;
  flex-wrap:wrap;justify-content:center;
  align-items:center;z-index:5;
  pointer-events:none;
}

.token{
  width:clamp(14px,2.5vw,22px);
  height:clamp(14px,2.5vw,22px);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(10px,1.8vw,16px);
  box-shadow:0 2px 6px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.2);
  transition:all .4s cubic-bezier(.4,0,.2,1);
  position:relative;
}

.token.animate-move{
  animation:tokenBounce .4s ease;
}

@keyframes tokenBounce{
  0%{transform:scale(1)}
  40%{transform:scale(1.3) translateY(-6px)}
  70%{transform:scale(.9)}
  100%{transform:scale(1)}
}

.token.animate-snake{
  animation:snakeSlide .8s ease;
}

@keyframes snakeSlide{
  0%{transform:scale(1)}
  30%{transform:scale(.6) rotate(20deg)}
  60%{transform:scale(.6) rotate(-20deg)}
  100%{transform:scale(1) rotate(0)}
}

.token.animate-ladder{
  animation:ladderClimb .8s ease;
}

@keyframes ladderClimb{
  0%{transform:scale(1)}
  30%{transform:scale(1.3) translateY(-10px)}
  60%{transform:scale(1.1) translateY(-5px)}
  100%{transform:scale(1) translateY(0)}
}

/*============================================
  SVG OVERLAY (snakes & ladders lines)
============================================*/
.svg-overlay{
  position:absolute;inset:0;z-index:2;
  pointer-events:none;
}

.snake-line{
  stroke:var(--snake-red);stroke-width:3;
  stroke-linecap:round;fill:none;
  opacity:.6;filter:drop-shadow(0 1px 3px rgba(192,57,43,.4));
}

.ladder-line{
  stroke:var(--ladder-green);stroke-width:2.5;
  stroke-linecap:round;fill:none;
  opacity:.6;filter:drop-shadow(0 1px 3px rgba(39,174,96,.4));
}

.ladder-rung{
  stroke:var(--ladder-green);stroke-width:2;
  stroke-linecap:round;opacity:.5;
}

/*============================================
  SIDE PANEL
============================================*/
.side-panel{
  display:flex;flex-direction:column;gap:12px;
  width:220px;max-height:600px;
}

.panel-card{
  background:var(--bg-card);
  border:1px solid rgba(212,168,67,.15);border-radius:12px;
  padding:16px;backdrop-filter:blur(10px);
  box-shadow:0 4px 20px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05);
}

.panel-title{
  font-family:'Cinzel',serif;font-size:12px;font-weight:700;
  color:var(--gold);letter-spacing:2px;text-transform:uppercase;
  margin-bottom:10px;padding-bottom:6px;
  border-bottom:1px solid rgba(212,168,67,.15);
}

.log-list{
  max-height:250px;overflow-y:auto;
  font-size:13px;color:var(--text-dim);
}

.log-entry{
  padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);
  display:flex;align-items:center;gap:6px;
}

.log-token{
  width:14px;height:14px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:10px;flex-shrink:0;
}

.log-text{color:var(--text-light);font-size:12px}

/* Snake & Ladder Legend */
.legend{display:flex;flex-direction:column;gap:6px}

.legend-item{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--text-dim);
}

.legend-line{
  width:24px;height:3px;border-radius:2px;
}

.legend-line.snake{background:var(--snake-red)}
.legend-line.ladder{background:var(--ladder-green)}

/*============================================
  GAME OVER MODAL
============================================*/
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);z-index:1000;
  justify-content:center;align-items:center;
  backdrop-filter:blur(5px);animation:fadeIn .2s ease;
}

.modal-overlay.active{display:flex}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.gameover-dialog{
  background:linear-gradient(145deg,#2a2015,#1a1410);
  border:2px solid var(--gold-dim);border-radius:20px;
  padding:32px 40px;text-align:center;
  box-shadow:0 0 60px rgba(212,168,67,.3),0 20px 60px rgba(0,0,0,.5);
  animation:dialogIn .4s ease;
}

@keyframes dialogIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}

.gameover-icon{font-size:56px;margin-bottom:12px}

.gameover-title{
  font-family:'Cinzel',serif;font-size:28px;font-weight:900;
  background:linear-gradient(135deg,#f0d060,#d4a843,#ffd700);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:3px;margin-bottom:8px;
}

.gameover-subtitle{font-size:16px;color:var(--text-dim);margin-bottom:20px}

.gameover-btn{
  font-family:'Cinzel',serif;font-weight:700;font-size:14px;
  padding:12px 32px;border:2px solid var(--gold);border-radius:12px;
  background:linear-gradient(135deg,rgba(60,45,15,.9),rgba(40,30,10,.95));
  color:var(--gold-light);cursor:pointer;transition:all .3s ease;
  letter-spacing:2px;text-transform:uppercase;
}

.gameover-btn:hover{
  box-shadow:0 0 25px rgba(212,168,67,.4);transform:translateY(-2px);
}

/*============================================
  CONFETTI
============================================*/
.confetti-container{
  position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;
}

.confetti-piece{
  position:absolute;width:10px;height:10px;
  top:-10px;animation:confettiFall linear forwards;
}

@keyframes confettiFall{
  0%{transform:translateY(0) rotateZ(0) rotateX(0);opacity:1}
  100%{transform:translateY(100vh) rotateZ(720deg) rotateX(360deg);opacity:0}
}

/*============================================
  RESPONSIVE
============================================*/
@media(max-width:768px){
  .main-container{flex-direction:column;align-items:center;padding:10px;gap:12px}
  .side-panel{width:100%;max-width:520px;max-height:none;flex-direction:row;flex-wrap:wrap}
  .panel-card{flex:1;min-width:200px}
  .controls{gap:6px}
  .btn{padding:8px 12px;font-size:11px}
  .board-wrapper{padding:8px}
  .title-container{padding:12px 12px 6px}
  .players-bar{max-width:100%}
}

@media(max-width:400px){
  .board{width:calc(100vw - 40px);height:calc(100vw - 40px)}
  .side-panel{flex-direction:column}
  .panel-card{min-width:auto}
}
</style>
</head>
<body>

<!-- ============================================
     TITLE
============================================ -->
<div class="title-container">
  <div class="title">
    <span class="title-icon">🎲</span>
    Snakes & Ladders
  </div>
  <div class="subtitle">The Classic Game of Fortune</div>
</div>

<!-- ============================================
     MAIN CONTENT
============================================ -->
<div class="main-container">
  <div class="board-section">

    <!-- Status -->
    <div class="status-bar">
      <div class="status-text" id="statusText">Roll the dice to begin!</div>
    </div>

    <!-- Player count -->
    <div class="player-selector">
      <button class="player-count-btn active" data-count="2" onclick="setPlayerCount(2)">2 Players</button>
      <button class="player-count-btn" data-count="3" onclick="setPlayerCount(3)">3 Players</button>
      <button class="player-count-btn" data-count="4" onclick="setPlayerCount(4)">4 Players</button>
    </div>

    <!-- Players -->
    <div class="players-bar" id="playersBar"></div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn" onclick="newGame()">
        <span class="btn-icon">⟳</span> New Game
      </button>
      <button class="btn" id="autoBtn" onclick="toggleAutoRoll()">
        <span class="btn-icon">⚡</span> <span id="autoLabel">Auto: Off</span>
      </button>
    </div>

    <!-- Dice -->
    <div class="dice-area">
      <div class="dice-container" id="diceContainer" onclick="rollDice()">
        <div class="dice" id="dice">
          <div class="dice-dots" id="diceDots"></div>
        </div>
      </div>
      <div class="roll-instruction" id="rollInstruction">Tap to roll</div>
    </div>

    <!-- Board -->
    <div class="board-wrapper">
      <div class="board-inner">
        <div class="board" id="board"></div>
        <svg class="svg-overlay" id="svgOverlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
      </div>
    </div>

  </div>

  <!-- Side Panel -->
  <div class="side-panel">
    <div class="panel-card">
      <div class="panel-title">🐍 Snakes & 🪜 Ladders</div>
      <div class="legend" id="legendList"></div>
    </div>
    <div class="panel-card">
      <div class="panel-title">Game Log</div>
      <div class="log-list" id="logList">
        <div style="color:var(--text-dim);font-style:italic;font-size:13px">Game not started</div>
      </div>
    </div>
  </div>
</div>

<!-- Game Over Modal -->
<div class="modal-overlay" id="gameoverModal">
  <div class="gameover-dialog">
    <div class="gameover-icon" id="gameoverIcon">🏆</div>
    <div class="gameover-title" id="gameoverTitle">Victory!</div>
    <div class="gameover-subtitle" id="gameoverSubtitle">Player 1 wins!</div>
    <button class="gameover-btn" onclick="newGame()">Play Again</button>
  </div>
</div>

<!-- Confetti Container -->
<div class="confetti-container" id="confettiContainer"></div>

<script>
/* ============================================
   PREMIUM SNAKES & LADDERS ENGINE
   ============================================ */

// ============================================
// CONFIGURATION
// ============================================
const PLAYER_CONFIGS = [
  { name: 'Player 1', emoji: '🔴', color: '#e74c3c', bg: 'radial-gradient(circle at 35% 35%,#ff6b6b,#c0392b)' },
  { name: 'Player 2', emoji: '🔵', color: '#3498db', bg: 'radial-gradient(circle at 35% 35%,#74b9ff,#2980b9)' },
  { name: 'Player 3', emoji: '🟢', color: '#2ecc71', bg: 'radial-gradient(circle at 35% 35%,#55efc4,#00b894)' },
  { name: 'Player 4', emoji: '🟡', color: '#f1c40f', bg: 'radial-gradient(circle at 35% 35%,#ffeaa7,#fdcb6e)' }
];

// Snakes: head → tail (go DOWN)
const SNAKES = {
  16: 6,
  47: 26,
  49: 11,
  56: 53,
  62: 19,
  64: 60,
  87: 24,
  93: 73,
  95: 75,
  98: 78
};

// Ladders: bottom → top (go UP)
const LADDERS = {
  1: 38,
  4: 14,
  9: 31,
  21: 42,
  28: 84,
  36: 44,
  51: 67,
  71: 91,
  80: 100
};

// ============================================
// GAME STATE
// ============================================
let playerCount = 2;
let players = [];
let currentPlayer = 0;
let gameOver = false;
let isRolling = false;
let autoRoll = false;
let autoTimer = null;
let moveLog = [];

// Dice dot positions for values 1-6
const DICE_PATTERNS = {
  1: [false,false,false, false,true,false, false,false,false],
  2: [false,false,true, false,false,false, true,false,false],
  3: [false,false,true, false,true,false, true,false,false],
  4: [true,false,true, false,false,false, true,false,true],
  5: [true,false,true, false,true,false, true,false,true],
  6: [true,false,true, true,false,true, true,false,true]
};

// ============================================
// SOUND ENGINE
// ============================================
let audioCtx = null;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
  try {
    initAudio();
    const ctx = audioCtx;
    if (!ctx) return;
    const now = ctx.currentTime;

    if (type === 'roll') {
      // Dice rattle
      for (let i = 0; i < 6; i++) {
        const t = now + i * 0.06;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(300 + Math.random() * 400, t);
        osc.type = 'square';
        gain.gain.setValueAtTime(0.04, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
        osc.start(t); osc.stop(t + 0.04);
      }
      // Final thud
      const osc2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      osc2.connect(g2); g2.connect(ctx.destination);
      osc2.frequency.setValueAtTime(150, now + 0.4);
      osc2.frequency.exponentialRampToValueAtTime(60, now + 0.55);
      g2.gain.setValueAtTime(0.1, now + 0.4);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
      osc2.start(now + 0.4); osc2.stop(now + 0.55);
    } else if (type === 'move') {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(300, now + 0.08);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'snake') {
      // Descending slimy sound
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.5);
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      osc.start(now); osc.stop(now + 0.5);
    } else if (type === 'ladder') {
      // Ascending happy sound
      const notes = [400, 500, 600, 800];
      notes.forEach((f, i) => {
        const t = now + i * 0.1;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(f, t);
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.08, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        osc.start(t); osc.stop(t + 0.15);
      });
    } else if (type === 'win') {
      const notes = [523, 659, 784, 1047, 1319, 1568];
      notes.forEach((f, i) => {
        const t = now + i * 0.12;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(f, t);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.1, t + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        osc.start(t); osc.stop(t + 0.3);
      });
    } else if (type === 'six') {
      // Exciting double note
      [800, 1000].forEach((f, i) => {
        const t = now + i * 0.08;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(f, t);
        gain.gain.setValueAtTime(0.08, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        osc.start(t); osc.stop(t + 0.15);
      });
    }
  } catch(e) {}
}

// ============================================
// BOARD POSITION MAPPING
// Board is numbered 1-100, bottom-left to top-right
// with alternating row directions (boustrophedon)
// ============================================
function numberToGridPos(num) {
  // num: 1-100
  // Returns {row: 0-9, col: 0-9} where row 0 is top
  if (num < 1 || num > 100) return null;
  const n = num - 1;
  const rowFromBottom = Math.floor(n / 10); // 0-9
  const row = 9 - rowFromBottom; // grid row (0=top)
  const posInRow = n % 10;
  // Even rows from bottom go left-to-right, odd go right-to-left
  const col = rowFromBottom % 2 === 0 ? posInRow : 9 - posInRow;
  return { row, col };
}

function gridPosToNumber(row, col) {
  const rowFromBottom = 9 - row;
  const posInRow = rowFromBottom % 2 === 0 ? col : 9 - col;
  return rowFromBottom * 10 + posInRow + 1;
}

// Get center coordinates of a cell in percentage (0-100)
function getCellCenter(num) {
  const pos = numberToGridPos(num);
  if (!pos) return { x: 0, y: 0 };
  return {
    x: (pos.col + 0.5) * 10,
    y: (pos.row + 0.5) * 10
  };
}

// ============================================
// RENDERING
// ============================================
function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';

  for (let r = 0; r < 10; r++) {
    for (let c = 0; c < 10; c++) {
      const cell = document.createElement('div');
      const num = gridPosToNumber(r, c);
      const isLight = (r + c) % 2 === 0;
      cell.className = 'cell ' + (isLight ? 'light' : 'dark');
      cell.dataset.num = num;

      // Number label
      const label = document.createElement('span');
      label.className = 'cell-number';
      label.textContent = num;
      cell.appendChild(label);

      // Mark snake/ladder cells
      if (SNAKES[num]) {
        cell.classList.add('snake-cell', 'snake-head');
      }
      if (LADDERS[num]) {
        cell.classList.add('ladder-cell', 'ladder-bottom');
      }
      // Also mark destination cells
      Object.values(SNAKES).forEach(v => {
        if (v === num) cell.classList.add('snake-cell');
      });
      Object.values(LADDERS).forEach(v => {
        if (v === num) cell.classList.add('ladder-cell');
      });

      boardEl.appendChild(cell);
    }
  }

  renderSnakesAndLadders();
  renderTokensOnBoard();
}

function renderSnakesAndLadders() {
  const svg = document.getElementById('svgOverlay');
  svg.innerHTML = '';

  // Draw ladders
  Object.entries(LADDERS).forEach(([from, to]) => {
    const start = getCellCenter(parseInt(from));
    const end = getCellCenter(parseInt(to));

    // Offset for parallel rails
    const dx = end.x - start.x;
    const dy = end.y - start.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    const nx = -dy / len * 1.2;
    const ny = dx / len * 1.2;

    // Left rail
    const line1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line1.setAttribute('x1', start.x + nx); line1.setAttribute('y1', start.y + ny);
    line1.setAttribute('x2', end.x + nx); line1.setAttribute('y2', end.y + ny);
    line1.setAttribute('class', 'ladder-line');
    svg.appendChild(line1);

    // Right rail
    const line2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line2.setAttribute('x1', start.x - nx); line2.setAttribute('y1', start.y - ny);
    line2.setAttribute('x2', end.x - nx); line2.setAttribute('y2', end.y - ny);
    line2.setAttribute('class', 'ladder-line');
    svg.appendChild(line2);

    // Rungs
    const rungCount = Math.max(3, Math.floor(len / 8));
    for (let i = 1; i < rungCount; i++) {
      const t = i / rungCount;
      const rx = start.x + dx * t;
      const ry = start.y + dy * t;
      const rung = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      rung.setAttribute('x1', rx + nx); rung.setAttribute('y1', ry + ny);
      rung.setAttribute('x2', rx - nx); rung.setAttribute('y2', ry - ny);
      rung.setAttribute('class', 'ladder-rung');
      svg.appendChild(rung);
    }
  });

  // Draw snakes
  Object.entries(SNAKES).forEach(([from, to]) => {
    const start = getCellCenter(parseInt(from));
    const end = getCellCenter(parseInt(to));

    // Create wavy path
    const dx = end.x - start.x;
    const dy = end.y - start.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    const waves = Math.max(2, Math.floor(len / 12));

    let d = `M ${start.x} ${start.y}`;
    for (let i = 1; i <= waves * 2; i++) {
      const t = i / (waves * 2);
      const px = start.x + dx * t;
      const py = start.y + dy * t;
      const offset = (i % 2 === 0 ? 1 : -1) * 2.5;
      const nx2 = -dy / len * offset;
      const ny2 = dx / len * offset;
      d += ` Q ${px + nx2} ${py + ny2}, ${start.x + dx * ((i + 0.5) / (waves * 2 + 1))} ${start.y + dy * ((i + 0.5) / (waves * 2 + 1))}`;
    }
    d += ` L ${end.x} ${end.y}`;

    // Simpler approach: use quadratic bezier curves
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    
    // Build a proper wavy path
    const points = [];
    const segments = waves * 2 + 1;
    for (let i = 0; i <= segments; i++) {
      const t2 = i / segments;
      const bx = start.x + dx * t2;
      const by = start.y + dy * t2;
      const offset2 = Math.sin(t2 * Math.PI * waves) * 2.5;
      const nx3 = -dy / len * offset2;
      const ny3 = dx / len * offset2;
      points.push({ x: bx + nx3, y: by + ny3 });
    }

    let pathD = `M ${points[0].x} ${points[0].y}`;
    for (let i = 1; i < points.length; i++) {
      pathD += ` L ${points[i].x} ${points[i].y}`;
    }

    path.setAttribute('d', pathD);
    path.setAttribute('class', 'snake-line');
    svg.appendChild(path);

    // Snake head dot
    const head = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    head.setAttribute('cx', start.x);
    head.setAttribute('cy', start.y);
    head.setAttribute('r', '1.5');
    head.setAttribute('fill', 'var(--snake-red-light)');
    head.setAttribute('opacity', '0.8');
    svg.appendChild(head);
  });
}

function renderTokensOnBoard() {
  // Remove existing tokens
  document.querySelectorAll('.tokens-container').forEach(el => el.remove());

  // Group players by position
  const positionMap = {};
  players.forEach((p, idx) => {
    if (p.position === 0) return; // not on board yet
    if (!positionMap[p.position]) positionMap[p.position] = [];
    positionMap[p.position].push(idx);
  });

  Object.entries(positionMap).forEach(([pos, playerIndices]) => {
    const gridPos = numberToGridPos(parseInt(pos));
    if (!gridPos) return;

    const cellIndex = gridPos.row * 10 + gridPos.col;
    const cellEl = document.getElementById('board').children[cellIndex];
    if (!cellEl) return;

    const container = document.createElement('div');
    container.className = 'tokens-container';
    container.style.cssText = 'position:absolute;inset:0;display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:1px;z-index:5;pointer-events:none;';

    playerIndices.forEach(idx => {
      const token = document.createElement('div');
      token.className = 'token';
      token.id = `token-${idx}`;
      token.style.background = PLAYER_CONFIGS[idx].bg;
      token.textContent = PLAYER_CONFIGS[idx].emoji;
      container.appendChild(token);
    });

    cellEl.style.position = 'relative';
    cellEl.appendChild(container);
  });
}

function renderPlayers() {
  const bar = document.getElementById('playersBar');
  bar.innerHTML = '';

  players.forEach((p, idx) => {
    const card = document.createElement('div');
    card.className = 'player-card' + (idx === currentPlayer && !gameOver ? ' active' : '');
    card.id = `player-card-${idx}`;

    const tokenPrev = document.createElement('div');
    tokenPrev.className = 'player-token-preview';
    tokenPrev.style.background = PLAYER_CONFIGS[idx].bg;
    tokenPrev.textContent = PLAYER_CONFIGS[idx].emoji;

    const info = document.createElement('div');
    info.className = 'player-info';

    const name = document.createElement('div');
    name.className = 'player-name';
    name.textContent = PLAYER_CONFIGS[idx].name;

    const pos = document.createElement('div');
    pos.className = 'player-pos';
    pos.textContent = p.position === 0 ? 'Start' : `Square ${p.position}`;
    pos.id = `player-pos-${idx}`;

    info.appendChild(name);
    info.appendChild(pos);
    card.appendChild(tokenPrev);
    card.appendChild(info);
    bar.appendChild(card);
  });
}

function renderDice(value) {
  const dotsEl = document.getElementById('diceDots');
  dotsEl.innerHTML = '';
  
  const pattern = DICE_PATTERNS[value] || DICE_PATTERNS[1];
  pattern.forEach((visible, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (visible ? ' visible' : '');
    dotsEl.appendChild(dot);
  });
}

function renderLegend() {
  const legend = document.getElementById('legendList');
  legend.innerHTML = '';

  Object.entries(SNAKES).forEach(([from, to]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-line snake"></div><span>🐍 ${from} → ${to}</span>`;
    legend.appendChild(item);
  });

  Object.entries(LADDERS).forEach(([from, to]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-line ladder"></div><span>🪜 ${from} → ${to}</span>`;
    legend.appendChild(item);
  });
}

// ============================================
// DICE ROLLING
// ============================================
function rollDice() {
  if (gameOver || isRolling) return;
  initAudio();

  isRolling = true;
  const diceEl = document.getElementById('dice');
  diceEl.classList.add('rolling');
  playSound('roll');

  // Animate dice faces
  let rollCount = 0;
  const rollInterval = setInterval(() => {
    renderDice(Math.floor(Math.random() * 6) + 1);
    rollCount++;
    if (rollCount >= 10) {
      clearInterval(rollInterval);
      const value = Math.floor(Math.random() * 6) + 1;
      renderDice(value);
      diceEl.classList.remove('rolling');

      if (value === 6) playSound('six');

      setTimeout(() => {
        processRoll(value);
      }, 300);
    }
  }, 60);
}

function processRoll(value) {
  const player = players[currentPlayer];
  const config = PLAYER_CONFIGS[currentPlayer];
  const oldPos = player.position;
  let newPos = oldPos + value;

  addLog(`${config.emoji} rolled a ${value}`);

  // Check if move is valid (can't go beyond 100)
  if (newPos > 100) {
    addLog(`${config.emoji} needs exact roll! Stays at ${oldPos || 'Start'}`);
    setStatus(`${config.name} needs exact roll to reach 100!`);
    isRolling = false;

    // If rolled 6, gets another turn
    if (value === 6) {
      setStatus(`${config.name} rolled 6! Roll again!`);
      addLog(`${config.emoji} gets another turn!`);
      scheduleAutoRoll();
      return;
    }

    nextTurn();
    return;
  }

  // Animate movement step by step
  animateMovement(currentPlayer, oldPos, newPos, value, () => {
    player.position = newPos;
    updatePlayerDisplay(currentPlayer);

    // Check win
    if (newPos === 100) {
      gameOver = true;
      clearAutoTimer();
      setStatus(`🏆 ${config.name} wins!`);
      addLog(`🏆 ${config.emoji} reached 100 and WINS!`);
      playSound('win');
      renderTokensOnBoard();
      setTimeout(() => {
        showGameOver(config.name);
        launchConfetti();
      }, 500);
      isRolling = false;
      return;
    }

    // Check for snake or ladder
    if (SNAKES[newPos]) {
      const dest = SNAKES[newPos];
      addLog(`🐍 ${config.emoji} bitten by snake! ${newPos} → ${dest}`);
      setStatus(`🐍 Snake! ${config.name} slides down to ${dest}`);
      playSound('snake');

      setTimeout(() => {
        highlightCell(newPos, 'snake');
        animateSpecial(currentPlayer, newPos, dest, 'snake', () => {
          player.position = dest;
          updatePlayerDisplay(currentPlayer);
          renderTokensOnBoard();
          finishTurn(value);
        });
      }, 400);
    } else if (LADDERS[newPos]) {
      const dest = LADDERS[newPos];
      addLog(`🪜 ${config.emoji} climbs ladder! ${newPos} → ${dest}`);
      setStatus(`🪜 Ladder! ${config.name} climbs to ${dest}`);
      playSound('ladder');

      setTimeout(() => {
        highlightCell(newPos, 'ladder');
        animateSpecial(currentPlayer, newPos, dest, 'ladder', () => {
          player.position = dest;
          updatePlayerDisplay(currentPlayer);
          renderTokensOnBoard();

          // Check win after ladder
          if (dest === 100) {
            gameOver = true;
            clearAutoTimer();
            setStatus(`🏆 ${config.name} wins!`);
            addLog(`🏆 ${config.emoji} reached 100 and WINS!`);
            playSound('win');
            setTimeout(() => {
              showGameOver(config.name);
              launchConfetti();
            }, 500);
            isRolling = false;
            return;
          }

          finishTurn(value);
        });
      }, 400);
    } else {
      renderTokensOnBoard();
      finishTurn(value);
    }
  });
}

function finishTurn(value) {
  isRolling = false;

  if (gameOver) return;

  // If rolled 6, same player goes again
  if (value === 6) {
    setStatus(`${PLAYER_CONFIGS[currentPlayer].name} rolled 6! Roll again!`);
    addLog(`${PLAYER_CONFIGS[currentPlayer].emoji} gets another turn!`);
    scheduleAutoRoll();
    return;
  }

  nextTurn();
}

function nextTurn() {
  currentPlayer = (currentPlayer + 1) % playerCount;
  renderPlayers();
  setStatus(`${PLAYER_CONFIGS[currentPlayer].name}'s turn`);
  document.getElementById('rollInstruction').textContent = `${PLAYER_CONFIGS[currentPlayer].name} - Tap to roll`;
  isRolling = false;
  scheduleAutoRoll();
}

// ============================================
// ANIMATION
// ============================================
function animateMovement(playerIdx, from, to, steps, callback) {
  let current = from;
  const step = () => {
    if (current >= to) {
      callback();
      return;
    }
    current++;
    players[playerIdx].position = current;
    renderTokensOnBoard();
    playSound('move');

    // Highlight current cell
    highlightCell(current, 'move');

    const token = document.getElementById(`token-${playerIdx}`);
    if (token) {
      token.classList.remove('animate-move');
      void token.offsetWidth; // force reflow
      token.classList.add('animate-move');
    }

    setTimeout(step, 200);
  };
  step();
}

function animateSpecial(playerIdx, from, to, type, callback) {
  setTimeout(() => {
    players[playerIdx].position = to;
    renderTokensOnBoard();

    const token = document.getElementById(`token-${playerIdx}`);
    if (token) {
      token.classList.add(type === 'snake' ? 'animate-snake' : 'animate-ladder');
    }

    setTimeout(callback, 600);
  }, 300);
}

function highlightCell(num, type) {
  // Remove previous highlights
  document.querySelectorAll('.cell.highlight').forEach(el => el.classList.remove('highlight'));

  const pos = numberToGridPos(num);
  if (!pos) return;
  const idx = pos.row * 10 + pos.col;
  const cell = document.getElementById('board').children[idx];
  if (cell) {
    cell.classList.add('highlight');
    setTimeout(() => cell.classList.remove('highlight'), 800);
  }
}

// ============================================
// UI HELPERS
// ============================================
function setStatus(text) {
  document.getElementById('statusText').textContent = text;
}

function updatePlayerDisplay(idx) {
  const posEl = document.getElementById(`player-pos-${idx}`);
  if (posEl) {
    posEl.textContent = players[idx].position === 0 ? 'Start' : `Square ${players[idx].position}`;
  }
}

function addLog(text) {
  moveLog.push(text);
  const logList = document.getElementById('logList');

  if (moveLog.length === 1) logList.innerHTML = '';

  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-text">${text}</span>`;
  logList.appendChild(entry);
  logList.scrollTop = logList.scrollHeight;

  // Keep last 50 entries
  while (logList.children.length > 50) {
    logList.removeChild(logList.firstChild);
  }
}

function showGameOver(winnerName) {
  document.getElementById('gameoverIcon').textContent = '🏆';
  document.getElementById('gameoverTitle').textContent = 'Victory!';
  document.getElementById('gameoverSubtitle').textContent = `${winnerName} wins the game!`;
  document.getElementById('gameoverModal').classList.add('active');
}

// ============================================
// CONFETTI
// ============================================
function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  container.innerHTML = '';
  const colors = ['#ffd700', '#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c', '#e67e22'];

  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size = 6 + Math.random() * 8;
    const left = Math.random() * 100;
    const delay = Math.random() * 2;
    const duration = 2 + Math.random() * 3;
    const shape = Math.random() > 0.5 ? '50%' : '0';

    piece.style.cssText = `
      left:${left}%;width:${size}px;height:${size}px;
      background:${color};border-radius:${shape};
      animation-delay:${delay}s;animation-duration:${duration}s;
    `;
    container.appendChild(piece);
  }

  setTimeout(() => container.innerHTML = '', 6000);
}

// ============================================
// AUTO ROLL
// ============================================
function toggleAutoRoll() {
  autoRoll = !autoRoll;
  document.getElementById('autoLabel').textContent = autoRoll ? 'Auto: On' : 'Auto: Off';
  document.getElementById('autoBtn').classList.toggle('active', autoRoll);

  if (autoRoll && !gameOver && !isRolling) {
    scheduleAutoRoll();
  } else {
    clearAutoTimer();
  }
}

function scheduleAutoRoll() {
  clearAutoTimer();
  if (!autoRoll || gameOver) return;
  autoTimer = setTimeout(() => {
    if (!gameOver && !isRolling) rollDice();
  }, 1200);
}

function clearAutoTimer() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
}

// ============================================
// PLAYER COUNT
// ============================================
function setPlayerCount(count) {
  playerCount = count;
  document.querySelectorAll('.player-count-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.count) === count);
  });
  newGame();
}

// ============================================
// NEW GAME
// ============================================
function newGame() {
  gameOver = false;
  isRolling = false;
  currentPlayer = 0;
  moveLog = [];
  clearAutoTimer();

  players = [];
  for (let i = 0; i < playerCount; i++) {
    players.push({ position: 0 });
  }

  document.getElementById('gameoverModal').classList.remove('active');
  document.getElementById('confettiContainer').innerHTML = '';
  document.getElementById('logList').innerHTML = '<div style="color:var(--text-dim);font-style:italic;font-size:13px">Game started!</div>';
  document.getElementById('rollInstruction').textContent = `${PLAYER_CONFIGS[0].name} - Tap to roll`;

  renderDice(1);
  renderBoard();
  renderPlayers();
  renderLegend();
  setStatus(`${PLAYER_CONFIGS[0].name}'s turn — Roll the dice!`);

  if (autoRoll) scheduleAutoRoll();
}

// ============================================
// KEYBOARD SUPPORT
// ============================================
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    rollDice();
  }
});

// ============================================
// SERVICE WORKER REGISTRATION
// ============================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw-snl.js')
      .then(reg => console.log('[PWA] SNL service worker registered:', reg.scope))
      .catch(err => console.warn('[PWA] SNL SW registration failed:', err));
  });
}

// ============================================
// INIT
// ============================================
document.addEventListener('DOMContentLoaded', () => newGame());
</script>
</body>
</html>
