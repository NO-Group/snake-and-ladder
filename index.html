<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snakes & Ladders - Premium</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(10, 50px);
            gap: 2px;
            margin: 20px auto;
            background: #8B4513;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }
        .cell {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            border: 1px solid #333;
            position: relative;
        }
        .cell.even { background: #f0d9b5; }
        .cell.odd { background: #b58863; }
        .token {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        button {
            background: #ffd700;
            color: black;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }
    </style>
</head>
<body>
    <h1>🐍 Premium Snakes & Ladders 🎲</h1>
    <div id="status">Player 1's Turn</div>
    <div id="board"></div>
    <button onclick="rollDice()">🎲 Roll Dice</button>
    <button onclick="resetGame()">New Game</button>

    <script>
        let boardSize = 100;
        let playerPos = 1;
        let currentPlayer = 1;
        let dice = 1;

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let i = 100; i >= 1; i--) {
                const cell = document.createElement('div');
                cell.className = `cell ${(i % 2 === 0) ? 'even' : 'odd'}`;
                cell.textContent = i;
                cell.id = 'cell-' + i;
                board.appendChild(cell);
            }
        }

        function rollDice() {
            dice = Math.floor(Math.random() * 6) + 1;
            alert('You rolled a ' + dice + '!');
            playerPos += dice;
            if (playerPos > 100) playerPos = 100;
            updateToken();
            checkSnakesAndLadders();
        }

        function updateToken() {
            // Simple token update logic
            console.log('Player at position', playerPos);
        }

        function checkSnakesAndLadders() {
            // Add snake and ladder logic here
            if (playerPos === 97) playerPos = 78; // example ladder
            updateToken();
        }

        function resetGame() {
            playerPos = 1;
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
